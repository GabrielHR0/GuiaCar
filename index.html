<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<meta name="theme-color" content="#1B4332">
<meta name="description" content="Guia passo a passo sobre o Cadastro Ambiental Rural (CAR)">
<meta property="og:title" content="GuiaCar">
<meta property="og:description" content="Guia passo a passo sobre o Cadastro Ambiental Rural (CAR)">
<meta property="og:image" content="https://guia-car.vercel.app/images/capa.png">
<meta property="og:url" content="https://guia-car.vercel.app">
<meta property="og:type" content="website">
<meta property="og:locale" content="pt_BR">
<title>GuiaCar</title>
<link rel="manifest" href="manifest.json">
<link rel="icon" href="images/icons/icon-192.svg" sizes="192x192">
<link rel="apple-touch-icon" href="images/icons/icon-192.svg">
<style>
*,::after,::before{box-sizing:border-box;margin:0;padding:0}
html{font-size:18px;-webkit-text-size-adjust:100%}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;background:#1B4332;color:#081C15;min-height:100dvh;display:flex;flex-direction:column;line-height:1.5}
#app{flex:1;display:flex;flex-direction:column;max-width:600px;margin:0 auto;width:100%;padding:0;min-height:100dvh}
#app-header{background:#fff;color:#1B4332;padding:12px 16px;display:flex;align-items:center;gap:8px;min-height:56px;position:sticky;top:0;z-index:10}
#app-header h1{font-size:1rem;font-weight:600;flex:1;color:#1B4332}
#app-content{flex:1;padding:16px;overflow-y:auto;display:flex;flex-direction:column;gap:12px}
#app-footer{position:sticky;bottom:0;background:#fff;border-top:1px solid #ddd;padding:8px 16px;display:flex;gap:8px;z-index:10}
#app-footer button{flex:1;display:flex;align-items:center;justify-content:center;gap:6px;min-height:56px}
#app-footer button .svg-icon{flex-shrink:0}
#offline-bar{display:none;background:#e63946;color:#fff;text-align:center;padding:6px 12px;font-size:.8rem;font-weight:600}
.loading{text-align:center;padding:40px 16px;color:#555}
.error-screen{text-align:center;padding:32px 16px;color:#c1121f}
.error-screen h2{font-size:1.2rem;margin-bottom:8px}
</style>
<link rel="stylesheet" href="css/style.css">
</head>
<body>
<div id="app">
  <div id="offline-bar">Você está offline — algumas informações podem não estar disponíveis</div>
  <div id="app-header">
    <button id="btn-menu" aria-label="Menu" data-action="menu"><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" class="svg-icon" style="width:28px;height:28px;stroke:#1B4332;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg></button>
    <img id="logo-img" src="images/capa.png" alt="GuiaCar" style="width:32px;height:32px;border-radius:6px;flex-shrink:0;object-fit:cover">
    <h1>GuiaCar</h1>
    <span class="uf-float" id="uf-badge">—</span>
  </div>
  <div id="app-content"></div>
  <div id="app-footer">
    <button id="btn-back" data-action="back" aria-label="Voltar"><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" class="svg-icon" style="width:22px;height:22px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round"><polyline points="15 18 9 12 15 6"/></svg> Voltar</button>
    <button id="btn-home" data-action="home" aria-label="Início"><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" class="svg-icon" style="width:22px;height:22px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg> Início</button>
  </div>
</div>
<script src="js/config.js"></script>
<script src="js/app.js"></script>
</body>
</html>
